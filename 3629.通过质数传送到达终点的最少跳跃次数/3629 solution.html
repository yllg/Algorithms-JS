<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：倒序广度优先搜索
        // 时间复杂度：O(MXlogMX)+O(nlogMX)
        // 空间复杂度：O(MXloglogMX)
        var MX = 1000001;
        var factors = Array.from({ length: MX }, () => []);
        for (let i = 2; i < MX; i++) {
            if (factors[i].length === 0) {
                for (let j = i; j < MX; j += i) {
                    factors[j].push(i);
                }
            }
        }

        var minJumps = function (nums) {
            const n = nums.length;
            const edges = new Map();
            for (let i = 0; i < n; i++) {
                const a = nums[i];
                if (factors[a].length === 1) {
                    if (!edges.has(a)) edges.set(a, []);
                    edges.get(a).push(i);
                }
            }
            let res = 0;
            const seen = new Array(n).fill(false);
            seen[n - 1] = true;
            let q = [n - 1];
            while (true) {
                let q2 = [];
                for (const i of q) {
                    if (i === 0) return res;
                    if (i > 0 && !seen[i - 1]) {
                        seen[i - 1] = true;
                        q2.push(i - 1);
                    }
                    if (i < n - 1 && !seen[i + 1]) {
                        seen[i + 1] = true;
                        q2.push(i + 1);
                    }
                    for (const p of factors[nums[i]]) {
                        const list = edges.get(p);
                        if (list) {
                            for (const j of list) {
                                if (!seen[j]) {
                                    seen[j] = true;
                                    q2.push(j);
                                }
                            }
                            edges.set(p, []);
                        }
                    }
                }
                q = q2;
                res++;
            }
        };

        // 方法二：正序广度优先搜索
        // 时间复杂度：O(MXlogMX)+O(nlogMX)
        // 空间复杂度：O(MXloglogMX)
        var MX = 1000001;
        var factors = Array.from({ length: MX }, () => []);
        for (let i = 2; i < MX; i++) {
            if (factors[i].length === 0) {
                for (let j = i; j < MX; j += i) {
                    factors[j].push(i);
                }
            }
        }

        var minJumps = function (nums) {
            const n = nums.length;
            const edges = new Map();
            for (let i = 0; i < n; i++) {
                for (const p of factors[nums[i]]) {
                    if (!edges.has(p)) edges.set(p, []);
                    edges.get(p).push(i);
                }
            }
            let res = 0;
            const seen = new Array(n).fill(false);
            seen[0] = true;
            let q = [0];
            while (true) {
                let q2 = [];
                for (const i of q) {
                    if (i === n - 1) return res;
                    if (i > 0 && !seen[i - 1]) {
                        seen[i - 1] = true;
                        q2.push(i - 1);
                    }
                    if (i < n - 1 && !seen[i + 1]) {
                        seen[i + 1] = true;
                        q2.push(i + 1);
                    }
                    if (factors[nums[i]].length === 1) {
                        const p = nums[i];
                        const list = edges.get(p);
                        if (list) {
                            for (const j of list) {
                                if (!seen[j]) {
                                    seen[j] = true;
                                    q2.push(j);
                                }
                            }
                            edges.set(p, []);
                        }
                    }
                }
                q = q2;
                res++;
            }
        };

        // test
        let nums = [1, 2, 4, 6]
        console.log(minJumps(nums));
    </script>
</body>

</html>
