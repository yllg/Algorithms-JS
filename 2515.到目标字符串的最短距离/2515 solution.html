<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：遍历
        // 时间复杂度：O(nL)
        // 空间复杂度：O(1)
        var closestTarget = function (words, target, startIndex) {
            let ans = words.length;
            const n = words.length;

            for (let i = 0; i < n; ++i) {
                if (words[i] === target) {
                    const dist = Math.abs(i - startIndex);
                    ans = Math.min(ans, Math.min(dist, n - dist));
                }
            }

            return ans < n ? ans : -1;
        };

        // test
        let words = ["hello", "i", "am", "leetcode", "hello"], target = "hello", startIndex = 1
        console.log(closestTarget(words, target, startIndex));
    </script>
</body>

</html>
