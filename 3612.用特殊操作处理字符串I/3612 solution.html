<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：模拟
        // 时间复杂度：O(n^2)
        // 空间复杂度：O(n^2)
        function processStr(s) {
            let result = [];
            for (const ch of s) {
                if (ch === '*') {
                    if (result.length) result.pop();
                } else if (ch === '#') {
                    result = result.concat(result);
                } else if (ch === '%') {
                    result.reverse();
                } else {
                    result.push(ch);
                }
            }
            return result.join('');
        }

        // test
        let s = "a#b%*"
        console.log(processStr(s));
    </script>
</body>

</html>
