    <script>
        // 方法一：辗转相除法
        // 时间复杂度：O(log n)
        // 空间复杂度：O(log n)
        function gcdOfOddEvenSums(n) {
            const gcd = (x, y) => (y === 0 ? x : gcd(y, x % y));
            return gcd(n * n, n * (n + 1));
        }

        // 方法二：数学
        // 时间复杂度：O(1)
        // 空间复杂度：O(1)
        function gcdOfOddEvenSums(n) {

        }

        console.log(gcdOfOddEvenSums(n));
