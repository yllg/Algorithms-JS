<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：正序遍历
        // 时间复杂度：O(m*n)
        // 空间复杂度：O(1)
        var rotateTheBox = function (boxGrid) {
            const m = boxGrid.length, n = boxGrid[0].length;
            const ans = Array.from({ length: n }, () => Array(m));

            for (let i = 0; i < m; i++) {
                const row = boxGrid[i];
                let cnt = 0;
                for (let j = 0; j < n; j++) {
                    let ch = row[j];
                    if (ch === '#') { // 石头
                        cnt++;
                        ch = '.'; // 先把石头清空
                    }
                    ans[j][m - 1 - i] = ch;
                    if (j === n - 1 || row[j + 1] === '*') { // 下一个格子是障碍物
                        // 石头垂直掉落后，从 j 往前 cnt 个格子都是石头
                        for (let k = j; k > j - cnt; k--) {
                            ans[k][m - 1 - i] = '#';
                        }
                        cnt = 0; // 重置计数器
                    }
                }
            }

            return ans;
        };

        // 方法二：倒序遍历 + 双指针
        // 时间复杂度：O(m*n)
        // 空间复杂度：O(1)
        var rotateTheBox = function (boxGrid) {
            const m = boxGrid.length, n = boxGrid[0].length;
            const ans = Array.from({ length: n }, () => Array(m).fill('.'));

            for (let i = 0; i < m; i++) {
                const row = boxGrid[i];
                let k = n - 1;
                for (let j = n - 1; j >= 0; j--) {
                    if (row[j] === '*') { // 障碍物
                        ans[j][m - 1 - i] = '*';
                        k = j - 1; // 障碍物左边最近的石头，在旋转后掉落到 j-1
                    } else if (row[j] === '#') { // 石头
                        ans[k][m - 1 - i] = '#'; // 旋转后，石头掉落到 k
                        k--;
                    }
                }
            }

            return ans;
        };

    </script>
</body>

</html>
