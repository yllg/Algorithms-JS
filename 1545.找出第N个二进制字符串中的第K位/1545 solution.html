<!DOCTYPE html>

<body>
    <script>
        // 方法一：递归
        // 时间复杂度：O(n)
        // 空间复杂度：O(n)
        const invert = (bit) => bit === '0' ? '1' : '0';

        var findKthBit = function (n, k) {
            if (k == 1) {
                return '0';
            }
            const mid = 1 << (n - 1);
            if (k == mid) {
                return '1';
            } else if (k < mid) {
                return findKthBit(n - 1, k);
            } else {
                k = mid * 2 - k;
                return invert(findKthBit(n - 1, k));
            }
        };

        // test
        let n = 3, k = 1
        console.log(findKthBit(n, k));
    </script>
</body>
