<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：二维前缀和 + 枚举边界元素
        // 时间复杂度：O(m*n)
        // 空间复杂度：O(m*n)
        var canPartitionGrid = function (grid) {
            const m = grid.length;
            const n = grid[0].length;
            const sum = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
            let total = 0;
            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    sum[i + 1][j + 1] = sum[i + 1][j] + sum[i][j + 1] - sum[i][j] + grid[i][j];
                    total += grid[i][j];
                }
            }
            for (let i = 0; i < m - 1; i++) {
                if (total === sum[i + 1][n] * 2) {
                    return true;
                }
            }
            for (let i = 0; i < n - 1; i++) {
                if (total === sum[m][i + 1] * 2) {
                    return true;
                }
            }
            return false;
        };

        // 方法二：旋转矩阵 + 枚举上半矩阵之和
        // 时间复杂度：O(m*n)
        // 空间复杂度：O(m*n)   
        var canPartitionGrid = function (grid) {
            let total = 0;
            let m = grid.length;
            let n = grid[0].length;
            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    total += grid[i][j];
                }
            }
            for (let k = 0; k < 2; k++) {
                let sum = 0;
                m = grid.length;
                n = grid[0].length;
                for (let i = 0; i < m - 1; i++) {
                    for (let j = 0; j < n; j++) {
                        sum += grid[i][j];
                    }
                    if (sum * 2 === total) {
                        return true;
                    }
                }
                grid = rotation(grid);
            }
            return false;
        };

        function rotation(grid) {
            const m = grid.length, n = grid[0].length;
            const tmp = Array.from({ length: n }, () => Array(m).fill(0));
            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    tmp[j][m - 1 - i] = grid[i][j];
                }
            }
            return tmp;
        }

        // test
        let grid = [[1, 4], [2, 3]]
        console.log(canPartitionGrid(grid));

    </script>
</body>
