<body>
    <script>
        // 方法一：动态规划 + 前缀和优化
        // 时间复杂度：O(n*m)
        // 空间复杂度：O(m)
        const MOD = 10 ** 9 + 7;

        var zigZagArrays = function (n, l, r) {
            const dp0 = new Array(r + 1).fill(0);
            const dp1 = new Array(r + 1).fill(0);
            const sum0 = new Array(r + 2).fill(0);
            const sum1 = new Array(r + 2).fill(0);

            for (let i = l; i <= r; i++) {
                dp0[i] = dp1[i] = 1;
                sum0[i] = sum1[i] = i - l + 1;
            }

            for (let i = 1; i < n; i++) {
                for (let j = l; j <= r; j++) {
                    dp0[j] = (sum1[r] - sum1[j] + MOD) % MOD;
                    dp1[j] = sum0[j - 1];
                }

                sum0[l] = dp0[l];
                sum1[l] = dp1[l];
                for (let j = l + 1; j <= r; j++) {
                    sum0[j] = (sum0[j - 1] + dp0[j]) % MOD;
                    sum1[j] = (sum1[j - 1] + dp1[j]) % MOD;
                }
            }

            return (sum0[r] + sum1[r]) % MOD;
        };

        // test
        let n = 3, l = 4, r = 5
        console.log(zigZagArrays(n, l, r))
    </script>
</body>
