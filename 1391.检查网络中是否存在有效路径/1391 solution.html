<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：相邻关系建图
        // 时间复杂度：O(t×α(t))
        // 空间复杂度：O(t)
        var hasValidPath = function (grid) {
            const m = grid.length;
            const n = grid[0].length;

            class DisjointSet {
                constructor(m, n) {
                    this.f = new Array(m * n);
                    for (let i = 0; i < m * n; ++i) {
                        this.f[i] = i;
                    }
                }

                find(x) {
                    return x === this.f[x] ? x : (this.f[x] = this.find(this.f[x]));
                }

                merge(x, y) {
                    this.f[this.find(x)] = this.find(y);
                }
            }

            const ds = new DisjointSet(m, n);

            const getId = (x, y) => {
                return x * n + y;
            };

            const detectL = (x, y) => {
                if (y - 1 >= 0 && (grid[x][y - 1] === 4 || grid[x][y - 1] === 6 || grid[x][y - 1] === 1)) {
                    ds.merge(getId(x, y), getId(x, y - 1));
                }
            };

            const detectR = (x, y) => {
                if (y + 1 < n && (grid[x][y + 1] === 3 || grid[x][y + 1] === 5 || grid[x][y + 1] === 1)) {
                    ds.merge(getId(x, y), getId(x, y + 1));
                }
            };

            const detectU = (x, y) => {
                if (x - 1 >= 0 && (grid[x - 1][y] === 3 || grid[x - 1][y] === 4 || grid[x - 1][y] === 2)) {
                    ds.merge(getId(x, y), getId(x - 1, y));
                }
            };

            const detectD = (x, y) => {
                if (x + 1 < m && (grid[x + 1][y] === 5 || grid[x + 1][y] === 6 || grid[x + 1][y] === 2)) {
                    ds.merge(getId(x, y), getId(x + 1, y));
                }
            };

            const handler = (x, y) => {
                switch (grid[x][y]) {
                    case 1:
                        detectL(x, y);
                        detectR(x, y);
                        break;
                    case 2:
                        detectU(x, y);
                        detectD(x, y);
                        break;
                    case 3:
                        detectL(x, y);
                        detectD(x, y);
                        break;
                    case 4:
                        detectR(x, y);
                        detectD(x, y);
                        break;
                    case 5:
                        detectL(x, y);
                        detectU(x, y);
                        break;
                    case 6:
                        detectR(x, y);
                        detectU(x, y);
                        break;
                }
            };

            for (let i = 0; i < m; ++i) {
                for (let j = 0; j < n; ++j) {
                    handler(i, j);
                }
            }

            return ds.find(getId(0, 0)) === ds.find(getId(m - 1, n - 1));
        };

        // 方法二：单元格性质建图
        // 时间复杂度：O(t×α(t))
        // 空间复杂度：O(t)
        var hasValidPath = function (grid) {
            const MAX_N = 300 * 300 + 5;
            const patterns = [0, 0b1010, 0b0101, 0b1100, 0b0110, 0b1001, 0b0011];

            const dirs = [
                [-1, 0],
                [0, 1],
                [1, 0],
                [0, -1]
            ];

            class DisjointSet {
                constructor() {
                    this.f = new Array(MAX_N);
                    for (let i = 0; i < MAX_N; ++i) this.f[i] = i;
                }

                find(x) {
                    return x === this.f[x] ? x : (this.f[x] = this.find(this.f[x]));
                }

                merge(x, y) {
                    this.f[this.find(x)] = this.find(y);
                }
            }

            const ds = new DisjointSet();
            const m = grid.length, n = grid[0].length;
            const getId = (x, y) => {
                return x * n + y;
            };

            const handler = (x, y) => {
                const pattern = patterns[grid[x][y]];
                for (let i = 0; i < 4; ++i) {
                    if (pattern & (1 << i)) {
                        const sx = x + dirs[i][0];
                        const sy = y + dirs[i][1];
                        if (sx >= 0 && sx < m && sy >= 0 && sy < n &&
                            (patterns[grid[sx][sy]] & (1 << ((i + 2) % 4)))) {
                            ds.merge(getId(x, y), getId(sx, sy));
                        }
                    }
                }
            };

            for (let i = 0; i < m; ++i) {
                for (let j = 0; j < n; ++j) {
                    handler(i, j);
                }
            }

            return ds.find(getId(0, 0)) === ds.find(getId(m - 1, n - 1));
        };

        // test
        let grid = [[2, 4, 3], [6, 5, 2]]
        console.log(hasValidPath(grid))
    </script>
</body>

</html>
