<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：排序
        // 时间复杂度：O(nlogn)
        // 空间复杂度：O(logn)
        var isGood = function (nums) {
            nums.sort((a, b) => a - b);
            const n = nums.length - 1;
            for (let i = 0; i < n; i++) {
                if (nums[i] !== i + 1) {
                    return false;
                }
            }
            return nums[n] === n;
        };

        // 方法二：统计频数
        // 时间复杂度：O(n)
        // 空间复杂度：O(n)
        var isGood = function (nums) {
            const n = nums.length;
            const count = new Array(n).fill(0);
            for (const a of nums) {
                if (a >= n) {
                    return false;
                }
                if (a < n - 1 && count[a] > 0) {
                    return false;
                }
                if (a === n - 1 && count[a] > 1) {
                    return false;
                }
                count[a]++;
            }
            return true;
        };


        // test
        let nums = [2, 1, 3]
        console.log(isGood(nums));
    </script>
</body>

</html>
