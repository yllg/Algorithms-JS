<!DOCTYPE html>

<body>
    <script>
        // 单值网格 是全部元素都相等的网格。

        // 方法一：找中位数
        // 时间复杂度：O(mnlog(mn))
        // 空间复杂度：O(mn)
        var minOperations = function (grid, x) {
            const nums = [];
            const m = grid.length, n = grid[0].length;
            const base = grid[0][0];

            for (let i = 0; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    if ((grid[i][j] - base) % x !== 0) {
                        return -1;
                    }
                    nums.push(grid[i][j]);
                }
            }

            nums.sort((a, b) => a - b);
            const choose = nums[Math.floor(nums.length / 2)];
            let ans = 0;
            for (const num of nums) {
                ans += Math.abs(num - choose) / x;
            }
            return ans;
        };

        // test
        let grid = [[2, 4], [6, 8]], x = 2
        console.log(minOperations(grid, x));
    </script>
</body>

</html>
