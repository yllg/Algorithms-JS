<body>
    <script>
        // 方法一：遍历 + 哈希表
        // 时间复杂度：O(n)
        // 空间复杂度：O(n)
        var minimumDistance = function (nums) {
            const next = Array.from({ length: nums.length }).fill(-1);
            const occur = new Map();
            let ans = nums.length + 1;

            for (let i = nums.length - 1; i >= 0; i--) {
                if (occur.has(nums[i])) {
                    next[i] = occur.get(nums[i]);
                }
                occur.set(nums[i], i);
            }

            for (let i = 0; i < nums.length; i++) {
                let secondPos = next[i];
                let thirdPos = next[secondPos];
                if (secondPos !== -1 && thirdPos !== -1) {
                    ans = Math.min(ans, thirdPos - i);
                }
            }

            if (ans === nums.length + 1) {
                return -1;
            } else {
                return ans * 2;
            }
        };

        // test
        let nums = [1, 2, 1, 1, 3]
        console.log(minimumDistance(nums));
    </script>
</body>

</html>
