<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：数学
        // 时间复杂度：O(logn)
        // 空间复杂度：O(1)
        var reverse = function (n) {
            let res = 0;
            while (n > 0) {
                res = res * 10 + n % 10;
                n = Math.floor(n / 10);
            }
            return res;
        };

        var mirrorDistance = function (n) {
            return Math.abs(n - reverse(n));
        };

        // test
        let n = 25
        console.log(mirrorDistance(n));
    </script>
</body>

</html>
