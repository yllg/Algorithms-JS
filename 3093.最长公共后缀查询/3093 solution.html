<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：字典树
        // 时间复杂度：O(N+M)
        // 空间复杂度：O(N)
        class TrieNode {
            constructor() {
                this.children = new Array(26);
                for (let i = 0; i < 26; i++) {
                    this.children[i] = null;
                }
                this.minLen = Infinity;
                this.idx = Infinity;
            }
        }

        class Trie {
            constructor() {
                this.root = new TrieNode();
            }

            insert(s, idx) {
                const len = s.length;
                let node = this.root;

                if (len < node.minLen) {
                    node.minLen = len;
                    node.idx = idx;
                }

                for (let i = 0; i < len; i++) {
                    const c = s.charCodeAt(i) - 97;
                    if (node.children[c] === null) {
                        node.children[c] = new TrieNode();
                    }
                    node = node.children[c];

                    if (len < node.minLen) {
                        node.minLen = len;
                        node.idx = idx;
                    }
                }
            }

            query(s) {
                let node = this.root;
                const len = s.length;

                for (let i = 0; i < len; i++) {
                    const c = s.charCodeAt(i) - 97;
                    if (node.children[c] !== null) {
                        node = node.children[c];
                    } else {
                        break;
                    }
                }

                return node.idx;
            }
        }

        function stringIndices(wordsContainer, wordsQuery) {
            const trie = new Trie();

            for (let i = 0; i < wordsContainer.length; i++) {
                const reversed = wordsContainer[i].split('').reverse().join('');
                trie.insert(reversed, i);
            }

            const res = [];
            for (const query of wordsQuery) {
                const reversed = query.split('').reverse().join('');
                res.push(trie.query(reversed));
            }

            return res;
        }

        // test
        let wordsContainer = ["abcd", "bcd", "xbcd"], wordsQuery = ["cd", "bcd", "xyz"]
        console.log(stringIndices(wordsContainer, wordsQuery));
    </script>
</body>

</html>
