<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：深度优先搜索 + 数学
        // 时间复杂度：O(n)
        // 空间复杂度：O(n)
        var assignEdgeWeights = function (edges) {
            const MOD = 1000000007n;

            const qpow = (x, y) => {
                let res = 1n;
                let base = BigInt(x);
                let exp = y;
                while (exp > 0) {
                    if (exp & 1) {
                        res = (res * base) % MOD;
                    }
                    base = (base * base) % MOD;
                    exp >>= 1;
                }
                return Number(res);
            };

            const dfs = (g, x, f) => {
                let maxDep = 0;
                for (const y of g[x]) {
                    if (y === f) continue;
                    maxDep = Math.max(maxDep, dfs(g, y, x) + 1);
                }
                return maxDep;
            };

            const n = edges.length + 1;
            const g = Array.from({ length: n + 1 }, () => []);

            for (let i = 0; i < edges.length; i++) {
                const u = edges[i][0];
                const v = edges[i][1];
                g[u].push(v);
                g[v].push(u);
            }

            const maxDep = dfs(g, 1, 0);
            return qpow(2, maxDep - 1);
        };

        // test
        let edges = [[1, 2], [1, 3], [3, 4], [3, 5]]
        console.log(assignEdgeWeights(edges));
    </script>
</body>

</html>
