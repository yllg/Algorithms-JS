<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <script>
        // 方法一：后缀乘积
        // 时间复杂度：O(n*m)
        // 空间复杂度：O(1)
        var constructProductMatrix = function (grid) {
            const MOD = 12345;
            const n = grid.length, m = grid[0].length;
            const p = Array.from({ length: n }, () => new Array(m).fill(0));

            let suffix = 1;
            for (let i = n - 1; i >= 0; i--) {
                for (let j = m - 1; j >= 0; j--) {
                    p[i][j] = suffix;
                    suffix = (suffix * grid[i][j]) % MOD;
                }
            }

            let prefix = 1;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < m; j++) {
                    p[i][j] = (p[i][j] * prefix) % MOD;
                    prefix = (prefix * grid[i][j]) % MOD;
                }
            }

            return p;
        };

        // test
        let grid = [[1, 2], [3, 4]]
        console.log(constructProductMatrix(grid));
    </script>
</body>

</html>
