<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：二分查找
        // 时间复杂度：O(n + qlogn)
        // 空间复杂度：O(n)
        var pathExistenceQueries = function (n, nums, maxDiff, queries) {
            const rights = [];
            for (let i = 1; i < n; i++) {
                if (nums[i] - nums[i - 1] > maxDiff) {
                    rights.push(i - 1);
                }
            }
            rights.push(n - 1);

            const lowerBound = (arr, target) => {
                let left = 0, right = arr.length;
                while (left < right) {
                    const mid = Math.floor((left + right) / 2);
                    if (arr[mid] < target) {
                        left = mid + 1;
                    } else {
                        right = mid;
                    }
                }
                return left;
            };

            return queries.map(([x, y]) => {
                return lowerBound(rights, x) === lowerBound(rights, y);
            });
        };

        // 方法二：并查集
        // 时间复杂度：O(n + q)
        // 空间复杂度：O(n)
        var pathExistenceQueries = function (n, nums, maxDiff, queries) {
            const tags = new Array(n);
            tags[0] = 0;

            for (let i = 1; i < n; i++) {
                if (nums[i] - nums[i - 1] > maxDiff) {
                    tags[i] = tags[i - 1] + 1;
                } else {
                    tags[i] = tags[i - 1];
                }
            }

            return queries.map(([x, y]) => tags[x] === tags[y]);
        };

        // test
        let n = 2, nums = [1, 3], maxDiff = 1, queries = [[0, 0], [0, 1]]
        console.log(pathExistenceQueries(n, nums, maxDiff, queries));
    </script>
</body>

</html>
