<body>
    <script>
        // 方法一：排序
        // 时间复杂度：O(mnlogn)
        // 空间复杂度：O(logn)
        var largestSubmatrix = function (matrix) {
            const m = matrix.length, n = matrix[0].length;
            let maxArea = 0;

            for (let i = 1; i < m; i++) {
                for (let j = 0; j < n; j++) {
                    if (matrix[i][j] === 1) {
                        matrix[i][j] += matrix[i - 1][j];
                    }
                }
            }

            for (let i = 0; i < m; i++) {
                matrix[i].sort((a, b) => b - a);
                for (let j = 0; j < n; j++) {
                    maxArea = Math.max(maxArea, (j + 1) * matrix[i][j]);
                }
            }

            return maxArea;
        };

        // test
        let matrix = [[0, 0, 1], [1, 1, 1], [1, 0, 1]]

        console.log(largestSubmatrix(matrix));
    </script>
</body>
