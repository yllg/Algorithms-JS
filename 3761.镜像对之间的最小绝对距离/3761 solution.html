<body>
    <script>
        // 方法一：一次遍历
        // 时间复杂度：O(nlogC)
        // 空间复杂度：O(n)
        var minMirrorPairDistance = function (nums) {
            const reverseNum = (x) => {
                let y = 0;
                while (x > 0) {
                    y = y * 10 + (x % 10);
                    x = Math.floor(x / 10);
                }
                return y;
            };

            const prev = new Map();
            const n = nums.length;
            let ans = n + 1;

            for (let i = 0; i < n; i++) {
                const x = nums[i];
                if (prev.has(x)) {
                    ans = Math.min(ans, i - prev.get(x));
                }
                prev.set(reverseNum(x), i);
            }

            return ans === n + 1 ? -1 : ans;
        };

        // test
        let nums = [12, 21, 45, 33, 54]
        console.log(minMirrorPairDistance(nums));
    </script>
