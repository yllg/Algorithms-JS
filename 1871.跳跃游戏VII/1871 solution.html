<!DOCTYPE html>

</head>

<body>
    <script>
        // 方法一：动态规划 + 前缀和优化
        // 时间复杂度：O(n)
        // 空间复杂度：O(n)
        var canReach = function (s, minJump, maxJump) {
            const n = s.length;
            const f = new Array(n).fill(0);
            const pre = new Array(n).fill(0);
            f[0] = 1;
            // 由于我们从 i=minJump 开始动态规划，因此需要将 [0,minJump) 这部分的前缀和预处理出来
            for (let i = 0; i < minJump; i++) {
                pre[i] = 1;
            }
            for (let i = minJump; i < n; i++) {
                const left = i - maxJump;
                const right = i - minJump;
                if (s[i] === '0') {
                    const total = pre[right] - (left <= 0 ? 0 : pre[left - 1]);
                    f[i] = total !== 0 ? 1 : 0;
                }
                pre[i] = pre[i - 1] + f[i];
            }
            return f[n - 1] === 1;
        };

        // test
        let s = "011010", minJump = 2, maxJump = 3
        console.log(canReach(s, minJump, maxJump));

    </script>
</body>
