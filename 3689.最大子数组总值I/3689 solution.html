<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 方法一：贪心
        // 时间复杂度：O(n)
        // 空间复杂度：O(1)
        var maxTotalValue = function (nums, k) {
            let m1 = Infinity, m2 = -Infinity;
            for (const x of nums) {
                m1 = Math.min(m1, x);
                m2 = Math.max(m2, x);
            }
            return (m2 - m1) * k;
        };

        // test
        let nums = [1, 3, 2], k = 2;
        console.log(maxTotalValue(nums, k));
    </script>
</body>

</html>
