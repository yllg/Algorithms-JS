<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 某个字母 c 的小写形式和大写形式，并且 每个 小写形式的 c 都出现在第一个大写形式的 c 之前

        // 方法一：记录首尾位置
        // 时间复杂度：O(n+∣Σ∣)
        // 空间复杂度：O(∣Σ∣)
        var numberOfSpecialChars = function (word) {
            const lastLow = new Array(26).fill(-1);
            const firstUp = new Array(26).fill(-1);
            for (let i = 0; i < word.length; i++) {
                const c = word[i];
                if (c >= 'a' && c <= 'z') {
                    lastLow[c.charCodeAt(0) - 97] = i;
                } else {
                    const idx = c.charCodeAt(0) - 65;
                    if (firstUp[idx] === -1) firstUp[idx] = i;
                }
            }
            let ans = 0;
            for (let i = 0; i < 26; i++) {
                if (lastLow[i] !== -1 && firstUp[i] !== -1 && lastLow[i] < firstUp[i]) {
                    ans++;
                }
            }
            return ans;
        };

        // test
        let word = "aaAbcBC"
        console.log(numberOfSpecialChars(word));
    </script>
</body>

</html>
